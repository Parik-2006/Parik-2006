<svg width="660" height="500" viewBox="0 0 660 500" xmlns="http://www.w3.org/2000/svg" style="background:#0d1117">

  <!-- Background -->
  <rect width="660" height="500" fill="#0d1117"/>

  <!-- Vertical axis line -->
  <line x1="330" y1="40" x2="330" y2="460" stroke="#2ea043" stroke-width="2.5"/>

  <!-- Horizontal axis line -->
  <line x1="60" y1="250" x2="600" y2="250" stroke="#2ea043" stroke-width="2.5"/>

  <!-- Dot at commit position (far left on horizontal axis = 99% commits) -->
  <circle cx="185" cy="250" r="6" fill="#0d1117" stroke="#58a6ff" stroke-width="2.5"/>

  <!-- Center intersection dot -->
  <circle cx="330" cy="250" r="5" fill="#0d1117" stroke="#2ea043" stroke-width="2"/>

  <!-- Highlight bar on horizontal axis from dot to center (commits weight) -->
  <line x1="185" y1="250" x2="330" y2="250" stroke="#2ea043" stroke-width="2.5" opacity="0.5"/>

  <!-- Labels -->
  <!-- Code review - top -->
  <text x="330" y="25" fill="#c9d1d9" font-family="JetBrains Mono, monospace" font-size="15" text-anchor="middle">Code review</text>

  <!-- Issues - right -->
  <text x="615" y="255" fill="#c9d1d9" font-family="JetBrains Mono, monospace" font-size="15" text-anchor="start">Issues</text>

  <!-- 99% Commits - left -->
  <text x="170" y="235" fill="#c9d1d9" font-family="JetBrains Mono, monospace" font-size="15" text-anchor="end">99%</text>
  <text x="170" y="255" fill="#c9d1d9" font-family="JetBrains Mono, monospace" font-size="15" text-anchor="end">Commits</text>

  <!-- 1% Pull requests - bottom -->
  <text x="330" y="480" fill="#c9d1d9" font-family="JetBrains Mono, monospace" font-size="15" text-anchor="middle">1%</text>
  <text x="330" y="498" fill="#c9d1d9" font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">Pull requests</text>

</svg>
