<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" style="background:#0d1117">
  <defs>
    <style>
      .chart-title { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: bold; fill: #c9d1d9; }
      .chart-label { font-family: 'JetBrains Mono', monospace; font-size: 14px; fill: #8b949e; }
      .chart-value { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: bold; fill: #c9d1d9; }
      .bar-bg { fill: #161b22; }
      .bar-fill { transition: width 0.3s ease; }
      .gradient-1 { fill: url(#grad1); }
      .gradient-2 { fill: url(#grad2); }
      .gradient-3 { fill: url(#grad3); }
      .gradient-4 { fill: url(#grad4); }
      .gradient-5 { fill: url(#grad5); }
    </style>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#79c0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f85149;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#da3633;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#238636;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d3a500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9e6a03;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bc8ef9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7d4fc4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="400" y="40" class="chart-title" text-anchor="middle">Repository Contribution Breakdown</text>
  
  <!-- C Programming -->
  <text x="20" y="100" class="chart-label">C Programming</text>
  <rect x="200" y="85" width="550" height="20" class="bar-bg" rx="3"/>
  <rect x="200" y="85" width="275" height="20" class="gradient-1" rx="3"/>
  <text x="490" y="102" class="chart-value">30%</text>
  
  <!-- Python -->
  <text x="20" y="160" class="chart-label">Python Projects</text>
  <rect x="200" y="145" width="550" height="20" class="bar-bg" rx="3"/>
  <rect x="200" y="145" width="237" height="20" class="gradient-2" rx="3"/>
  <text x="460" y="162" class="chart-value">25%</text>
  
  <!-- JavaScript/Web -->
  <text x="20" y="220" class="chart-label">JavaScript/Web</text>
  <rect x="200" y="205" width="550" height="20" class="bar-bg" rx="3"/>
  <rect x="200" y="205" width="187" height="20" class="gradient-3" rx="3"/>
  <text x="410" y="222" class="chart-value">20%</text>
  
  <!-- C++ -->
  <text x="20" y="280" class="chart-label">C++ & Algorithms</text>
  <rect x="200" y="265" width="550" height="20" class="bar-bg" rx="3"/>
  <rect x="200" y="265" width="110" height="20" class="gradient-4" rx="3"/>
  <text x="340" y="282" class="chart-value">10%</text>
  
  <!-- Other -->
  <text x="20" y="340" class="chart-label">HTML/CSS/Other</text>
  <rect x="200" y="325" width="550" height="20" class="bar-bg" rx="3"/>
  <rect x="200" y="325" width="100" height="20" class="gradient-5" rx="3"/>
  <text x="330" y="342" class="chart-value">15%</text>
  
  <!-- Key Stats Box -->
  <rect x="50" y="420" width="700" height="140" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  
  <text x="400" y="450" class="chart-value" text-anchor="middle">📊 Key Statistics</text>
  
  <!-- Stats Grid -->
  <text x="100" y="490" class="chart-label">Total Repos:</text>
  <text x="240" y="490" class="chart-value">16</text>
  
  <text x="100" y="520" class="chart-label">Total Stars:</text>
  <text x="240" y="520" class="chart-value">7</text>
  
  <text x="100" y="550" class="chart-label">Active Projects:</text>
  <text x="240" y="550" class="chart-value">3</text>
  
  <text x="420" y="490" class="chart-label">Top Language:</text>
  <text x="600" y="490" class="chart-value">C</text>
  
  <text x="420" y="520" class="chart-label">Most Starred:</text>
  <text x="600" y="520" class="chart-value">OS-EL-3-SEM</text>
  
  <text x="420" y="550" class="chart-label">Languages:</text>
  <text x="600" y="550" class="chart-value">5</text>
  
</svg>
